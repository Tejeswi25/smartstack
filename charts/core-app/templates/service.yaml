apiVersion: v1 
kind: Service 
metadata:
  name: core-app-service 
  labels:
    app: core-app 
spec: 
  type: {{ .Values.service.type }}
  ports: 
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP 
      name: http 
  selector: 
    app: core-app 